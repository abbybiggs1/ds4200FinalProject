<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Shopping Behavioral Analysis</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 24px;
            background: #f8f7ff;
            color: #333;
        }

        /* ── Navigation bar ── */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 4px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 6px 10px;
            margin-bottom: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .nav-title {
            font-size: 13px;
            font-weight: 600;
            color: #4f46e5;
            margin-right: 8px;
            white-space: nowrap;
        }

        .nav-sep {
            color: #d1d5db;
            font-size: 14px;
            user-select: none;
        }

        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #111827;
            text-decoration: none;
        }

        .nav-link.active {
            background: #ede9fe;
            color: #4f46e5;
        }

        /* ── Rest of existing styles ── */
        h1 { color: #4f46e5; font-size: 24px; margin-bottom: 4px; }
        h3 { color: #818cf8; font-size: 17px; text-align: center; margin: 4px 0; }

        .btn-group {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            justify-content: center;
        }

        .btn {
            background: #ede9fe;
            color: #4f46e5;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin: 0;
        }
        .btn:hover { background: #ddd6fe; }
        .btn:active { transform: scale(0.97); }

        p, li { font-size: 15px; line-height: 1.6; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }

        ul.A {
            background: #ede9fe;
            border-radius: 10px;
            padding: 16px 32px;
            display: inline-block;
        }
        ul.A li { color: #4f46e5; }

        img { border-radius: 12px; margin-top: 16px; max-width: 100%; }

        .image-row { display: flex; gap: 16px; margin-top: 24px; }
        .image-row img { width: 50%; object-fit: cover; margin-top: 0; }
    </style>
</head>
